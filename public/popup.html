<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Tab Manager</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 380px;
        min-height: 200px;
        background: #202124;
        color: #e8eaed;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
      }

      .header {
        padding: 16px 16px 12px;
        border-bottom: 1px solid #3c3d40;
      }

      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .header-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: 600;
        color: #e8eaed;
      }

      .header-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8ab4f8;
      }

      .header-version {
        font-size: 11px;
        color: #9aa0a6;
        background: #292a2d;
        padding: 3px 8px;
        border-radius: 20px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 12px;
      }

      .stat-card {
        background: #292a2d;
        border-radius: 8px;
        padding: 8px;
        text-align: center;
      }

      .stat-number {
        font-size: 20px;
        font-weight: 700;
      }

      .stat-number.total    { color: #8ab4f8; }
      .stat-number.inactive { color: #fdd663; }
      .stat-number.toclose  { color: #f28b82; }

      .stat-label {
        font-size: 10px;
        color: #9aa0a6;
        margin-top: 2px;
      }

      .search-wrap {
        display: flex;
        align-items: center;
        background: #292a2d;
        border-radius: 8px;
        padding: 8px 12px;
        gap: 8px;
        border: 1px solid #3c3d40;
        transition: border 0.15s;
      }

      .search-wrap:focus-within {
        border-color: #8ab4f8;
      }

      .search-input {
        background: none;
        border: none;
        outline: none;
        font-size: 13px;
        color: #e8eaed;
        width: 100%;
        font-family: inherit;
      }

      .search-input::placeholder { color: #5f6368; }

      .body {
        padding: 12px 16px;
        max-height: 420px;
        overflow-y: auto;
      }

      .body::-webkit-scrollbar { width: 4px; }
      .body::-webkit-scrollbar-track { background: transparent; }
      .body::-webkit-scrollbar-thumb { background: #3c3d40; border-radius: 4px; }

      .suggestions-section {
        background: rgba(242,139,130,0.08);
        border: 1px solid rgba(242,139,130,0.25);
        border-radius: 8px;
        margin-bottom: 14px;
        overflow: hidden;
      }

      .suggestions-header {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #f28b82;
        padding: 8px 12px;
      }

      .suggestion-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-top: 1px solid rgba(242,139,130,0.15);
        gap: 8px;
      }

      .suggestion-info { flex: 1; overflow: hidden; }

      .suggestion-title {
        font-size: 12px;
        font-weight: 500;
        color: #e8eaed;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .suggestion-reason {
        font-size: 11px;
        color: #9aa0a6;
        margin-top: 2px;
      }

      .close-btn {
        flex-shrink: 0;
        background: #f28b82;
        color: #202124;
        border: none;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s;
      }

      .close-btn:hover { background: #ee675c; }

      .no-suggestions {
        font-size: 12px;
        color: #9aa0a6;
        padding: 10px 12px;
        text-align: center;
      }

      .tab-group { margin-bottom: 14px; }

      .group-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #9aa0a6;
        margin-bottom: 6px;
      }

      .tab-item {
        background: #292a2d;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: background 0.15s;
        border: 1px solid transparent;
      }

      .tab-item:hover {
        background: #35363a;
        border-color: #3c3d40;
      }

      .tab-item-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 2px;
      }

      .tab-title {
        font-size: 13px;
        font-weight: 500;
        color: #e8eaed;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }

      .tab-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 3px;
        flex-wrap: wrap;
      }

      .tab-domain { font-size: 11px; color: #9aa0a6; }
      .tab-age    { font-size: 11px; color: #5f6368; }

      .badge {
        font-size: 9px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .badge-ai        { background: rgba(138,180,248,0.15); color: #8ab4f8; }
      .badge-inactive  { background: rgba(253,214,99,0.15);  color: #fdd663; }
      .badge-stale     { background: rgba(242,139,130,0.15); color: #f28b82; }
      .badge-duplicate { background: rgba(129,201,149,0.15); color: #81c995; }

      .tab-summary {
        font-size: 11px;
        color: #bdc1c6;
        font-style: italic;
        margin-top: 4px;
        line-height: 1.4;
      }

      .note-visible {
        font-size: 11px;
        color: #fdd663;
        margin-top: 4px;
      }

      .note-btn {
        margin-top: 6px;
        font-size: 11px;
        color: #9aa0a6;
        background: none;
        border: 1px solid #3c3d40;
        border-radius: 4px;
        padding: 2px 8px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }

      .note-btn:hover { color: #e8eaed; border-color: #8ab4f8; }

      .note-area {
        display: none;
        margin-top: 8px;
        flex-direction: column;
        gap: 6px;
      }

      .note-area.open { display: flex; }

      .note-input {
        width: 100%;
        height: 56px;
        font-size: 12px;
        font-family: inherit;
        background: #202124;
        border: 1px solid #3c3d40;
        border-radius: 6px;
        padding: 6px 8px;
        resize: none;
        color: #e8eaed;
        outline: none;
        transition: border 0.15s;
      }

      .note-input:focus     { border-color: #8ab4f8; }
      .note-input::placeholder { color: #5f6368; }

      .note-save-btn {
        align-self: flex-end;
        font-size: 11px;
        background: #8ab4f8;
        color: #202124;
        border: none;
        border-radius: 6px;
        padding: 4px 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s;
      }

      .note-save-btn:hover { background: #93bbf9; }

      .empty {
        text-align: center;
        padding: 40px 20px;
        color: #9aa0a6;
        font-size: 13px;
        line-height: 1.6;
      }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-top">
        <div class="header-title">
          <div class="header-dot"></div>
          Smart Tab Manager
        </div>
        <span class="header-version">v1.0</span>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number total" id="stat-total">0</div>
          <div class="stat-label">Total tabs</div>
        </div>
        <div class="stat-card">
          <div class="stat-number inactive" id="stat-inactive">0</div>
          <div class="stat-label">Inactive</div>
        </div>
        <div class="stat-card">
          <div class="stat-number toclose" id="stat-toclose">0</div>
          <div class="stat-label">To close</div>
        </div>
      </div>
      <div class="search-wrap">
        <span style="font-size:14px;">🔍</span>
        <input
          class="search-input"
          id="search"
          type="text"
          placeholder="Search tabs..."
          autocomplete="off"
        />
      </div>
    </div>

    <div class="body" id="app"></div>
    <script src="popup.js"></script>
  </body>
</html>
