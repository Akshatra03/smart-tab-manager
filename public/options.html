<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smart Tab Manager — Settings</title>
    <style>
      body {
        width: 480px;
        margin: 40px auto;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        background: #fff;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
      }

      input[type="password"] {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        outline: none;
        transition: border 0.15s;
      }

      input[type="password"]:focus {
        border-color: #888;
      }

      .hint {
        font-size: 12px;
        color: #888;
        margin-top: 6px;
      }

      button {
        margin-top: 16px;
        padding: 8px 20px;
        font-size: 14px;
        font-weight: 500;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover {
        background: #333;
      }

      .status {
        margin-top: 12px;
        font-size: 13px;
        color: #2d6a2d;
        min-height: 20px;
      }

      .status.error {
        color: #9b1c1c;
      }
    </style>
  </head>
  <body>
    <h1>Smart Tab Manager — Settings</h1>

    <label for="api-key">Groq API Key</label>
    <input
      type="password"
      id="api-key"
      placeholder="sk-..."
    />
    <div class="hint">
    Your key is stored locally on your device only. It is never sent anywhere except directly to Groq.
    </div>

    <button id="save-btn">Save Key</button>
    <div class="status" id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
